name: Συγχρονισμός Βασικών Δεδομένων (Weekly)

# NOTE: OASA blocks GitHub Actions IPs.
# Run sync_master_data.py LOCALLY and push the updated db/athensbus.db.
# This workflow serves as a reminder and runs the schedule/stop sync
# parts that are less likely to be blocked.

on:
  schedule:
    - cron: "0 2 * * 0"     # 02:00 UTC every Sunday
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Sync schedules only (lines/routes/stops must be synced locally)
        run: python scripts/sync_schedules.py
        continue-on-error: true

      - name: Commit schedule updates
        run: |
          git config user.name  "athensbus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add db/athensbus.db
          git diff --cached --quiet || git commit -m "schedule sync: $(date -u +'%Y-%m-%d')" && git push || true
